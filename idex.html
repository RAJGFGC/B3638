<!doctype html>
<html>
  <head>
    <title>My Hacker Stories</title>
  </head>
  <body>
    <div id="root">
      <h1>My Hacker Stories</h1>

      <label for="search">Search:</label>
      <input id="search" type="text" />

      <hr />

      <ul id="storyList"></ul>
    </div>

    <script>
      const list = [
        {
          title: "React",
          url: "https://reactjs.org/",
          author: "Jordan Walke",
          num_comments: 3,
          points: 4,
          objectID: 0,
        },
        {
          title: "Redux",
          url: "https://redux.js.org/",
          author: "Dan Abramov, Andrew Clark",
          num_comments: 2,
          points: 5,
          objectID: 1,
        },
      ];

      const ul = document.getElementById("storyList");

      list.forEach(function (item) {
        // 1️⃣ create element
        const li = document.createElement("li");

        // 2️⃣ set content
        li.textContent = item.title;

        // 3️⃣ append to parent
        ul.appendChild(li);
      });
    </script>
  </body>
</html>
